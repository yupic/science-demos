<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>{{ page.title }} | {{ site.title }}</title>

  <!-- GitHub Pages default theme CSS (with cache-busting like ?v=...) -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}?v={{ site.github.build_revision }}">

  <style>
    .footer {
      margin: 10px 0;
      font-size: 12px;
      color: #999;
      text-align: center;
    }
    .footer a { color: #999; }

    /* чтобы footer не прилипал и выглядел аккуратно под темой */
    .footer { padding: 12px 0 24px; }
  </style>
</head>

<body>
  <!-- контейнеры, которые ожидает дефолтная тема Pages -->
  <div class="container-lg px-3 my-5 markdown-body">
    {{ content }}

    <footer class="footer">
      © autism_science • MIT License •
      <a href="https://github.com/yupic/science-demos" target="_blank" rel="noopener">GitHub</a> •
      <a href="https://www.youtube.com/@autism-ru" target="_blank" rel="noopener">YouTube</a> •
      <a href="https://t.me/autism_science" target="_blank" rel="noopener">Telegram</a>
    </footer>
  </div>
</body>
</html>
